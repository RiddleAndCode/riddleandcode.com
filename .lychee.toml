# Lychee link checker configuration
# Docs: https://lychee.cli.rs/usage/configuration/

timeout        = 20
max_retries    = 3
retry_wait_time = 3
threads        = 8

# 429 = Too Many Requests (rate-limited, not a dead link)
accept = ["200..=299", "429"]

exclude_loopback = true
include_mail     = false

# Paths excluded from link checking:
#   templates/ — source files with {{ }} placeholders, not served directly
#   archive/   — legacy content with deliberately removed dependencies
#   de/        — generated mirrors of EN pages; same links, no need to double-check
#   slides/    — standalone presentation decks with their own asset structure
#   includes/  — HTML fragments loaded via JS; relative paths resolve at insertion
#                point (root), not in the fragment file itself (false positives)
exclude_path = [
  "templates",
  "archive",
  "de",
  "slides",
  "includes",
]

exclude = [
  # JavaScript pseudo-links
  "^javascript:",
  "^#$",

  # Google services — blocked in CI environments
  "googletagmanager\\.com",
  "googleapis\\.com",
  "google\\.com/maps",
  "google\\.com/recaptcha",

  # Social platforms — aggressively rate-limit CI IPs
  "linkedin\\.com",
  "twitter\\.com",
  "x\\.com",
  "instagram\\.com",
  "facebook\\.com",

  # Localhost and staging
  "localhost",
  "127\\.0\\.0\\.1",

  # Our blog — returns 403 to CI bots (anti-scraping)
  "blog\\.riddleandcode\\.com",

  # EU project sites — down or unreachable from CI
  "smartrural21\\.eu",
  "smarturural27\\.eu",
  "ec\\.europa\\.eu/odr",
]

# Output dead links to a file so the scheduled issue workflow can attach it
output = "lychee/out.md"
