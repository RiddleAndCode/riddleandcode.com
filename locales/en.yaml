# KERN for Aggregators page (kern/for-aggregators.html)
# ══════════════════════════════════════════════════════════════════════════════
ka_meta_title: "KERN for Aggregators — Riddle&amp;Code"
ka_meta_desc: "Secure your flexibility bids every time. KERN autonomously dispatches and confirms execution behind the meter — no manual intervention, no penalties."
ka_eyebrow: "KERN — For Aggregators"
ka_h1: "Your bids are only as good as<br><strong>what's behind the meter.</strong>"
ka_lead: "KERN acts as a forecast-driven, autonomous sub-aggregator behind the meter. You send a flexibility signal — KERN selects assets based on real-time state and forecasted availability, executes via MIOTY or Zigbee, and confirms delivery back to you. No manual intervention. No missed bids."
ka_pains_h2: "The five pains <strong>KERN solves</strong>"
ka_pain1_title: "Unreliable connectivity to distributed assets"
ka_pain1_desc: "Rural BESS sites, industrial premises, basements — LTE drops, WiFi is unstable. Assets can't be committed to bids. Portfolio size is limited by infrastructure, not by availability."
ka_pain1_sol: "MIOTY (10km, 1.5M msg/day, IEC standard) and Zigbee Mesh connect every asset — independent of LTE and WiFi."
ka_pain2_title: "No dispatch confirmation"
ka_pain2_desc: "Bid placed, dispatch sent — whether the asset responded remains unknown until the next meter reading. Deviations are detected too late."
ka_pain2_sol: "Every dispatch is confirmed at asset level and reported back in real-time. You know immediately whether the bid is being fulfilled."
ka_pain3_title: "Manual response to forecast deviations"
ka_pain3_desc: "Weather change, load shift, asset failure — someone has to notice, decide and intervene. This doesn't scale."
ka_pain3_sol: "KERN continuously compares actual asset state against bid position and rebalances autonomously — before the deviation becomes critical."
ka_pain4_title: "Poor forecast quality without asset visibility"
ka_pain4_desc: "Without real-time telemetry at asset level, flexibility forecasts are estimates. Overbidding means penalties. Underbidding means lost revenue."
ka_pain4_sol: "Rolling 24h flexibility forecast per asset and portfolio — driven by live state of charge, weather-based PV models and historical load patterns. Continuously refined as the delivery window approaches."
ka_pain5_title: "Operational overhead scales with portfolio"
ka_pain5_desc: "Every new asset, every new site, every new asset class adds complexity. Growth requires more team, more monitoring, more manual dispatch management."
ka_pain5_sol: "New assets are onboarded into KERN — the aggregator gets more flexibility capacity, not more operational burden."
ka_loop_h2: "The <strong>operative loop</strong>"
ka_loop_note: "You interact with steps 1 and 2. Everything else is KERN."
ka_ref_h2: "Proven in <strong>production</strong>"
ka_ref_quote: "Leading utilities use KERN to power their flexibility aggregator — securing bids on energy markets with confirmed dispatch from MV/LV assets."
ka_ref_meta: "Live system · MV/LV microgrid · Visitable on request"
ka_cta_h2: "Ready to secure every bid?"
ka_cta_p: "30 minutes to show you how KERN fits into your existing dispatch stack — and which assets you can add to your portfolio today."

