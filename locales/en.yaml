ki_meta_title: "KERN by Riddle&amp;Code — Autonomous Energy Platform"
ki_meta_desc: "KERN is the autonomous energy management platform behind the meter — forecasting, dispatching and delivering flexibility for aggregators, utilities and energy communities."

ki_eyebrow: "Riddle&amp;Code — Autonomous Energy Platform"
ki_h1: "<strong>Autonomous</strong> energy<br>behind the meter."
ki_lead: "KERN is the platform that sits behind the meter — autonomously optimising, forecasting and dispatching flexibility from households, facilities, microgrids and energy communities."

ki_concept_stmt: "You send a signal.<br><strong>KERN delivers.</strong><br>What happens behind the meter is our job."
ki_concept_sub: "Aggregators, utilities and platforms interact with KERN through a clean API — forecast in, demand signal in, flexibility confirmed out. KERN handles everything in between: rebalancing, asset selection, dispatch, confirmation."

ki_contexts_h2: "Optimising <strong>behind the meter</strong>"
ki_contexts_sub: "KERN works across four asset contexts — all on one platform."
ki_ctx_household_h3: Households
ki_ctx_household_p: "PV + home storage + heat pump + EV charger — optimised as a unit. HEMS fleet management for utilities."
ki_ctx_ci_h3: "Commercial &amp; Industrial"
ki_ctx_ci_p: "Commercial PV, BESS, CHP, controllable loads on MV/LV level. Peak shaving, load management, flexibility dispatch."
ki_ctx_micro_h3: Microgrids
ki_ctx_micro_p: "Multiple assets behind a shared grid connection point. Coordinated optimisation, island-mode capable."
ki_ctx_esc_h3: "Energy Communities (ESC)"
ki_ctx_esc_p: "Community optimisation across multiple members and meters. Shared self-consumption maximised, collective flexibility aggregated."

ki_modes_h2: "Three <strong>optimisation modes</strong>"
ki_modes_sub: "Configurable per asset or portfolio — combinable."
ki_mode1_num: "Mode 01"
ki_mode1_h3: Self-consumption
ki_mode1_p: "Maximise local self-consumption. Minimise grid import and export. Default mode for households and small C&amp;I."
ki_mode2_num: "Mode 02"
ki_mode2_h3: "Economic optimisation"
ki_mode2_p: "Maximise monetary yield — intraday arbitrage, FCR/aFRR bids, peak shaving, demand charge reduction. Dispatch driven by real-time day-ahead and intraday price signals. Default for aggregators and C&amp;I flexibility."
ki_mode3_num: "Mode 03"
ki_mode3_h3: "Community optimisation"
ki_mode3_p: "Maximise shared self-consumption across multiple members. Fair allocation by share. Default for ESC and microgrids."

ki_conn_h2: "Connectivity <strong>by topology</strong>"
ki_conn_sub: "The right technology for every asset configuration — both managed as one unified layer in KERN."
ki_zigbee_use: "Contiguous sites"
ki_zigbee_h3: "Zigbee Mesh"
ki_zigbee_p: "For assets on the same premises — buildings, campuses, industrial sites. Low-cost, easy to deploy, self-healing mesh network. No complex gateway infrastructure required."
ki_mioty_use: "Distributed assets"
ki_mioty_h3: MIOTY
ki_mioty_p: "IEC-standard LPWAN for geographically dispersed assets — rural PV, MV-connected BESS, distributed sites. 10km range, 1.5M messages/day, independent of LTE and WiFi."
ki_tech_link: "Full technology overview →"

