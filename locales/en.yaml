# ══════════════════════════════════════════════════════════════════════════════
ku_meta_title: "KERN for Utilities — Riddle&amp;Code"
ku_meta_desc: "Turn your customer base into a steerable flexibility portfolio. KERN manages HEMS fleets, energy communities and C&amp;I assets — autonomously, on one platform."

ku_eyebrow: "KERN — For Utilities"
ku_h1: "You have the customers.<br>You have the assets.<br><strong>KERN connects them.</strong>"
ku_lead: "Your customers have PV, storage, heat pumps and EV chargers. Your grid has flexibility requirements. KERN is the autonomous platform layer that turns your customer base into a steerable, monetisable flexibility portfolio — without building an operations team for it."

ku_pains_h2: "Where utilities are <strong>leaving value on the table</strong>"
ku_pain1_title: "Controllable assets without an optimisation platform"
ku_pain1_desc: "Smart meters and CLS switches are rolling out — but there is no platform above them. No optimisation, no aggregation, no market access. The potential stays untapped."
ku_pain1_sol: "KERN sits above the meter as the autonomous management layer — real-time optimisation, fleet control, market-ready aggregation."
ku_pain2_title: "Redispatch 2.0 is manual and costly"
ku_pain2_desc: "Grid congestion management requires coordinated control of distributed generation — without a platform this is operationally complex, error-prone and doesn't scale."
ku_pain2_sol: "KERN handles Redispatch 2.0-compliant dispatch autonomously, with confirmation per asset."
ku_pain3_title: "Customers leaving for smarter energy providers"
ku_pain3_desc: "New energy players offer HEMS, community tariffs and flexibility revenues. Utilities without smart services lose the customers who want to actively participate."
ku_pain3_sol: "KERN is your behind-the-meter product — branded as your service, delivered by KERN. Customers stay and engage."
ku_pain4_title: "No access to flexibility markets from your own customer base"
ku_pain4_desc: "You have the customer relationships and the assets — but without an aggregation platform you can't monetise that flexibility."
ku_pain4_sol: "KERN aggregates your customer base into a marketable portfolio. You can run your own aggregator subsidiary — or partner with an external one."

ku_cases_h2: "Three ways to <strong>deploy KERN</strong>"
ku_case1_num: "Use case 01"
ku_case1_h3: "HEMS Fleet — Customer Base as Flexible Resource"
ku_case1_p: "Deploy KERN HEMS with household customers who have PV and storage. Customers benefit from self-consumption optimisation and lower bills. You gain a steerable fleet for Redispatch or flexibility monetisation — without operational load per customer."
ku_case2_num: "Use case 02"
ku_case2_h3: "Energy Communities — Compliant, Automatic"
ku_case2_p: "KERN ESC manages optimisation and autonomous asset control for energy communities. You can offer energy communities as a service — no custom development, no manual billing processes needed from KERN's side."
ku_case3_num: "Use case 03"
ku_case3_h3: "Flexibility Monetisation — From Your Customer Base"
ku_case3_p: "The aggregated flexibility from HEMS fleet, C&amp;I customers and ESC becomes a marketable portfolio via KERN. Route it through your own aggregator subsidiary or an external partner to FCR, aFRR or intraday markets."

ku_ref_h2: "The <strong>reference model</strong> — running in production"
ku_ref_intro: "Leading utilities built their complete flexibility stack on KERN:"
ku_ref_grid_label: Grid
ku_ref_grid_value: "Live MV/LV microgrid — production system, Austria"
ku_ref_agg_label: Aggregator
ku_ref_agg_value: "Utility-owned aggregator securing bids on Austrian energy markets via KERN"
ku_ref_comm_label: Communities
ku_ref_comm_value: "Energy community platform — KERN as optimisation layer"
ku_ref_note: "Live system — visitable on request in Austria."

ku_cta_h2: "Ready to monetise your customer base?"
ku_cta_p: "30 minutes to map which assets in your network are ready for KERN — and what the flexibility revenue potential looks like."

