# KERN for Communities page (kern/for-communities.html)
# ══════════════════════════════════════════════════════════════════════════════
kc_meta_title: "KERN for Energy Communities — Riddle&amp;Code"
kc_meta_desc: "Maximise shared self-consumption automatically. KERN optimises every asset in the community and connects collective flexibility to markets."
kc_eyebrow: "KERN — For Energy Communities"
kc_h1: "Your community generates energy.<br><strong>KERN keeps it in the community.</strong>"
kc_lead: "KERN autonomously optimises storage, controllable loads and generation across all community members — maximising shared self-consumption and forecasting the collective flexibility that can be offered to markets or grid operators."
kc_pains_h2: "What holds energy communities <strong>back today</strong>"
kc_pain1_title: "Self-consumption is measured, not optimised"
kc_pain1_desc: "Without real-time optimisation, energy is exported to the grid even when members have demand — the community's potential stays largely untapped."
kc_pain1_sol: "KERN forecasts generation and consumption per member (24h ahead) and steers assets to maximise what stays in the community."
kc_pain2_title: "No real-time visibility across the community"
kc_pain2_desc: "Operators don't know how much is being generated, consumed and shared right now — optimisation and steering are impossible without this view."
kc_pain2_sol: "Real-time telemetry from every asset, aggregated into a community dashboard. Full visibility, per member and as a whole."
kc_pain3_title: "Storage and loads are not coordinated"
kc_pain3_desc: "Community storage and controllable loads are managed manually or not at all — no automatic charging when PV surplus is available, no discharging when members need it."
kc_pain3_sol: "KERN steers shared storage and controllable loads autonomously — aligning generation, storage and consumption in real-time."
kc_pain4_title: "Connectivity across multiple sites is unsolved"
kc_pain4_desc: "Members at different buildings or locations are hard to reliably connect — LTE drops out, WiFi doesn't reach far enough."
kc_pain4_sol: "Zigbee Mesh for contiguous sites, MIOTY for distributed members (10km, independent of LTE/WiFi) — both managed as one unified layer."
kc_pain5_title: "Collective flexibility potential goes unused"
kc_pain5_desc: "An active community with PV and storage has real collective flexibility — but without a platform it can neither be forecasted nor offered to aggregators or grid operators."
kc_pain5_sol: "KERN provides rolling 24h flexibility forecasts for the whole community and connects to aggregators or grid operators on request."
kc_loop_h2: "How KERN <strong>operates the community</strong>"
kc_features_h2: "What KERN <strong>does for communities</strong>"
kc_feat1_h3: Community optimisation
kc_feat1_p: "Maximises collective self-consumption across all members — in real-time and with a 24h forecast."
kc_feat2_h3: Storage and load control
kc_feat2_p: "Autonomous steering of shared storage and controllable loads to align supply and demand within the community."
kc_feat3_h3: Real-time dashboard
kc_feat3_p: "Community generation, consumption, self-consumption rate and flexibility potential — for operators and optionally for members."
kc_feat4_h3: Flexibility forecast
kc_feat4_p: "Rolling 24h forecast of available community flexibility — the basis for aggregator or grid operator integration."
kc_feat5_h3: Multi-site connectivity
kc_feat5_p: "Zigbee Mesh for contiguous sites, MIOTY for distributed members — every participant reliably connected."
kc_feat6_h3: Aggregator connection
kc_feat6_p: "Community flexibility dispatched on demand — with confirmed execution back to the requesting party."
kc_partner_h3: "Already handling ESC billing or member management?"
kc_partner_p: "KERN is the optimisation and control layer — not a billing platform. We integrate with your existing billing infrastructure to add autonomous asset management and flexibility forecasting on top of what you already offer your ESC clients. Together you give communities the complete package: billing from you, optimisation from KERN."
kc_partner_cta: "Discuss a partnership →"
kc_cta_h2: "More energy stays in the community."
kc_cta_p: "30 minutes to show how KERN optimises a live energy community — from real-time control to flexibility markets."

