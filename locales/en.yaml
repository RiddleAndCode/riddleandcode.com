# About Us page (company/about-us.html)
# ══════════════════════════════════════════════════════════════════════════════
au_meta_title: "About Riddle&amp;Code — Infrastructure for Distributed Energy"
au_meta_desc: "Riddle&amp;Code builds KERN — the infrastructure platform for distributed energy management. Serving utilities, aggregators, and communities across Europe."
au_eyebrow: "Vienna, Austria"
au_h1: "Infrastructure for<br><span class=\"highlight\">distributed energy.</span>"
au_sub: "Riddle&amp;Code builds KERN — the platform utilities and aggregators use to connect, manage, and monetise distributed energy assets at scale. We own the full stack: hardware, connectivity, platform, and market access."
au_why_tag: "WHY WE EXIST"
au_why_h2: "The infrastructure gap in the energy transition"
au_why_desc: "Distributed energy resources are multiplying — rooftop solar, batteries, heat pumps, EV chargers. Utilities face flexibility obligations. Aggregators need scale. Nobody wanted to build the connectivity and compliance layer from scratch.<br><br>We did."
au_val1_h3: "Infrastructure, not apps"
au_val1_p: "KERN is the layer that sits between physical assets and energy markets. We're not a consumer app or a meter-reading service. We're the platform your operations team runs — reliably, at scale, without depending on consumer devices or WiFi."
au_val2_h3: "Full stack ownership"
au_val2_p: "Hardware, MIOTY wireless connectivity, HEMS/ESC/LSP platform, and direct market access in a single integration. Partners deploy once — they don't stitch together three separate vendor relationships to get an asset to market."
au_val3_h3: "Regulatory complexity absorbed"
au_val3_p: "ESC compliance, flexibility reporting, and audit documentation are built into KERN — not a manual process your team maintains. We carry the technical and regulatory complexity so you carry the customer relationship."
au_what_h3: "What KERN delivers"
au_what_sub: "One platform. Three asset classes. One integration."
au_tech1_h4: "MIOTY wireless connectivity"
au_tech1_p: "10km range, 1.5 million messages per day, ultra-low power. No WiFi, no consumer app dependency — works in basements, rural areas, and industrial sites. One gateway covers an entire neighbourhood or industrial zone."
au_tech2_h4: "HEMS — residential assets"
au_tech2_p: "Manage residential PV and battery portfolios. Optimise intraday trading, flexibility dispatch, and curtailment prevention — automatically, across thousands of homes."
au_tech3_h4: "ESC — energy sharing communities"
au_tech3_p: "Community energy pooling built for Austrian and EU regulatory frameworks. Compliance is auditable and automated — not a spreadsheet your legal team reviews quarterly."
au_tech4_h4: "LSP — grid-scale flexibility"
au_tech4_p: "Large Scale Plant management for grid-scale assets: BESS, industrial loads, and aggregated portfolios. Direct access to ancillary service and flexibility markets — no third-party aggregator required."
au_proof_tag: "TRACK RECORD"
au_proof_h2: "Validated, not promised"
au_proof1_h3: "Leading utilities"
au_proof1_p: "Validated with leading utilities. The deployment model, regulatory alignment, and economics are validated at regional scale — the same playbook applies to any regional utility territory."
au_proof2_h3: "MIOTY at scale"
au_proof2_p: "1.5 million messages per day demonstrated capacity. IEC standardised — not proprietary lock-in. Partners aren't betting on a single vendor's survival; they're adopting a published standard."
au_proof3_h3: "Unit economics that work"
au_proof3_p: "Hardware at €239 sell / €100 COGS — 58% margin. Platform ARR of €114 per HEMS household per year. The economics support utility bundle pricing and operator margin at scale."
au_founders_tag: FOUNDERS
au_founders_h2: "The team behind KERN"
au_cta_h2: "Talk to the team"
au_cta_p: "Executive briefing, technical deep-dive, or partner conversation — we'll match the format to where you are."
au_cta_primary: "Get in Touch"
au_cta_secondary: "Explore KERN"

