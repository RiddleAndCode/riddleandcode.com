car_meta_title: "Career — Riddle&amp;Code"
car_meta_desc: "Join the team building KERN — the infrastructure platform for distributed energy. Work on hard problems that matter for the energy transition."
car_h1: "<span class=\"highlight\">Join Our Team</span><br>Build the Infrastructure for the Energy Transition"
car_sub: "Riddle&amp;Code builds KERN — the platform utilities and aggregators use to connect, dispatch and monetise distributed energy assets at scale. We work on hard problems in energy infrastructure, wireless connectivity and autonomous systems."
car_purpose_tag: "OUR PURPOSE"
car_purpose_h2: "The Riddle&amp;Code Spirit"
car_purpose1_h3: "Purpose: Why do we exist?"
car_purpose1_strong: "Building infrastructure for the energy transition."
car_purpose1_p: "We provide the connectivity and autonomy layer that turns distributed energy assets into manageable, monetisable infrastructure — for utilities and aggregators across Europe."
car_purpose2_h3: "Vision: Where are we headed?"
car_purpose2_strong: "A Europe where every distributed energy asset contributes to grid stability."
car_purpose2_p: "We envision a grid where flexibility behind the meter is continuously forecasted, dispatched and confirmed — without manual intervention, at any scale."
car_purpose3_h3: "Mission: How will we get there?"
car_purpose3_strong: "KERN in every utility flexibility stack in Europe by 2030."
car_purpose3_p: "Our commitment is to deliver the autonomous energy management layer that makes distributed flexibility reliable, monetisable and scalable."
car_values_h3: "Our Core Values"
car_values_sub: "The principles that guide everything we do"
car_val1_label: Curiosity
car_val1_desc: "We're constantly exploring, questioning, and learning. Curiosity drives innovation and helps us push boundaries in building energy infrastructure."
car_val2_label: Empathy
car_val2_desc: "Understanding our colleagues, partners, and customers allows us to build solutions that truly matter and make a difference."
car_val3_label: Listening
car_val3_desc: "Active listening helps us understand needs, collaborate effectively, and build better products together."
car_val4_label: Grit
car_val4_desc: "Solving hard problems requires perseverance. We embrace challenges and persist until we achieve our goals."
car_val5_label: Fun
car_val5_desc: "We believe in enjoying the journey. A positive, engaging workplace culture brings out our best work."
car_val6_label: Commitment
car_val6_desc: "We're dedicated to our mission, our team, and our partners. Commitment drives excellence in everything we deliver."
car_benefits_tag: BENEFITS
car_benefits_h2: "Why Join Riddle&amp;Code"
car_ben1_h3: "Real infrastructure impact"
car_ben1_p: "Work on a production system managing live energy assets. Your code controls real hardware behind real meters — not a simulation."
car_ben2_h3: "Vienna &amp; Remote"
car_ben2_p: "Vienna was ranked the most liveable city for the tenth time in a row, and we know there are other nice places too. Work where you're most productive."
car_ben3_h3: "Flexible Environment"
car_ben3_p: "A modern office or working remotely — enjoy a flexible working environment that adapts to your needs and lifestyle."
car_ben4_h3: "European Energy Market"
car_ben4_p: "Work at the intersection of wireless technology, energy markets and regulatory frameworks across Austria, Germany and the EU."
car_ben5_h3: "Fair Compensation"
car_ben5_p: "Receive fair compensation that corresponds to your qualifications and experience."
car_ben6_h3: "Work-Life Balance"
car_ben6_p: "A refreshed you is a happy you. We ensure you have enough time for work-life balance and offer various perks to support your wellbeing."
car_cta_h2: "Ready to Join Us?"
car_cta_p: "We're always looking for talented people who share our passion for building infrastructure for the energy transition."
