tech_meta_title: "Technologie — KERN by Riddle&amp;Code"
tech_meta_desc: "MIOTY, Zigbee Mesh, 24-h-Flexibilitätsprognosen und autonome Steuerung — die Technologie hinter KERN."
tech_eyebrow: Technologie
tech_h1: "Gebaut für Energieinfrastruktur.<br><strong>Kein IoT-Umbau.</strong>"
tech_lead: "MIOTY, Zigbee Mesh, ein autonomer 24-h-Prognose-Regelkreis und bestätigte Steuerung — zweckgebaut für die Anforderungen des Flexibilitätsmanagements hinter dem Zähler."
tech_hw_h2: "NODE ZERO — <strong>zweckentwickelte Hardware</strong>"
tech_hw_sub_pre: "Entwickelt in Partnerschaft mit "
tech_hw_sub_post: " — von Grund auf für Energieinfrastruktur konzipiert, kein umgebautes IoT-Produkt."
tech_conn_h2: "Konnektivität <strong>nach Topologie</strong>"
tech_conn_sub: "Die Technologiewahl folgt der Asset-Topologie — nicht umgekehrt."
tech_zigbee_badge: "Zusammenhängende Standorte"
tech_zigbee_h3: Zigbee Mesh
tech_zigbee_use: "Gebäude, Campusse, Industriegelände, Microgrids an einem Standort"
tech_mioty_badge: "Verteilte Assets"
tech_mioty_h3: MIOTY
tech_mioty_use: "Geografisch verteilte Assets — ländliche PV, MV-BESS, mehrere entfernte Standorte"
tech_vs_h3: "MIOTY vs. LoRaWAN"
tech_loop_h2: "Der <strong>autonome Regelkreis</strong>"
tech_loop_sub: "KERN arbeitet kontinuierlich — prognostiziert, reagiert und steuert ohne manuelle Eingriffe."
tech_optim_h2: "Wie KERN <strong>Entscheidungen trifft</strong>"
tech_optim_sub: "Jeder Optimierungszyklus nutzt Live-Telemetrie, Marktsignale und erlernte Muster — keine manuelle Konfiguration."
tech_optim1_h4: "Preissignalbasierter Dispatch"
tech_optim1_p: "KERN verfolgt Day-Ahead- und Intradaypreise, FCR/aFRR-Signalwerte und Netzentgeltstrukturen in Echtzeit. Jede Dispatch-Entscheidung wird gegen das aktive Marktumfeld bewertet — nicht gegen einen festen Fahrplan."
tech_optim2_h4: "Rollierendes Prognosemodell"
tech_optim2_p: "Verbrauchs- und Erzeugungsprognose 24 Stunden im Voraus pro Asset — kombiniert Live-Ladezustand, wettergestützte PV-Modelle und historische Lastmuster. Kontinuierlich verfeinert, je näher das Lieferfenster rückt."
tech_optim3_h4: "Kontinuierliches Rebalancing"
tech_optim3_p: "KERN vergleicht alle paar Minuten den tatsächlichen Asset-Zustand mit der zugesagten Dispatch-Position. Erkannte Abweichungen lösen automatische Neuauswahl und Re-Dispatch aus — bevor das Lieferfenster schließt und Pönalen anfallen."
tech_assets_h2: "Unterstützte <strong>Assets und Protokolle</strong>"
tech_assets_sub: "KERN normalisiert alle Asset-Typen auf ein einheitliches Datenmodell — unabhängig von Hersteller oder Protokoll."
tech_assets_label1: "Asset-Typen"
tech_assets_label2: "Kommunikationsprotokolle"
tech_security_h2: "Sicherheit <strong>&amp; Compliance</strong>"
tech_sec1_h4: "Ende-zu-Ende-Verschlüsselung"
tech_sec1_p: "Alle Asset-Kommunikation Ende-zu-Ende verschlüsselt — vom Sensor bis zur Plattform."
tech_sec2_h4: "Zertifikatsbasierte Authentifizierung"
tech_sec2_p: "Jedes Asset durch Zertifikat authentifiziert — keine unautorisierten Steuerbefehle möglich."
tech_sec3_h4: "Redispatch 2.0"
tech_sec3_p: "Konform mit den Redispatch-2.0-Anforderungen für dezentrale Erzeugungssteuerung."
tech_sec4_h4: "§14a / EAG / EnFG"
tech_sec4_p: "Kompatibel mit den Regelungen für steuerbare Verbrauchseinrichtungen in Deutschland und Österreich."
tech_cta: "Technische Demo buchen"

