# KERN für Energiegemeinschaften (kern/for-communities.html)
# ══════════════════════════════════════════════════════════════════════════════
kc_meta_title: "KERN für Energiegemeinschaften — Riddle&amp;Code"
kc_meta_desc: "Maximieren Sie den gemeinsamen Eigenverbrauch automatisch. KERN optimiert jedes Asset in der Gemeinschaft und verbindet kollektive Flexibilität mit Märkten."
kc_eyebrow: "KERN — Für Energiegemeinschaften"
kc_h1: "Ihre Gemeinschaft erzeugt Energie.<br><strong>KERN behält sie in der Gemeinschaft.</strong>"
kc_lead: "KERN optimiert Speicher, steuerbare Lasten und Erzeugung aller Gemeinschaftsmitglieder autonom — maximiert den gemeinsamen Eigenverbrauch und prognostiziert die kollektive Flexibilität für Märkte oder Netzbetreiber."
kc_pains_h2: "Was Energiegemeinschaften <strong>heute zurückhält</strong>"
kc_pain1_title: "Eigenverbrauch wird gemessen, nicht optimiert"
kc_pain1_desc: "Ohne Echtzeit-Optimierung wird Energie ins Netz eingespeist, obwohl Mitglieder Bedarf haben — das Potenzial der Gemeinschaft bleibt weitgehend ungenutzt."
kc_pain1_sol: "KERN prognostiziert Erzeugung und Verbrauch pro Mitglied (24 h voraus) und steuert Assets, um den Eigenverbrauch zu maximieren."
kc_pain2_title: "Keine Echtzeit-Transparenz über die Gemeinschaft"
kc_pain2_desc: "Betreiber wissen nicht, wie viel gerade erzeugt, verbraucht und geteilt wird — ohne diese Sicht sind Optimierung und Steuerung unmöglich."
kc_pain2_sol: "Echtzeit-Telemetrie von jedem Asset, aggregiert in einem Gemeinschafts-Dashboard. Vollständige Transparenz, pro Mitglied und insgesamt."
kc_pain3_title: "Speicher und Lasten werden nicht koordiniert"
kc_pain3_desc: "Gemeinschaftsspeicher und steuerbare Lasten werden manuell oder gar nicht verwaltet — kein automatisches Laden bei PV-Überschuss, kein Entladen bei Mitgliederbedarf."
kc_pain3_sol: "KERN steuert gemeinsame Speicher und steuerbare Lasten autonom — gleicht Erzeugung, Speicherung und Verbrauch in Echtzeit ab."
kc_pain4_title: "Konnektivität über mehrere Standorte ist ungelöst"
kc_pain4_desc: "Mitglieder an verschiedenen Gebäuden oder Standorten sind schwer zuverlässig zu verbinden — LTE bricht ab, WLAN reicht nicht weit genug."
kc_pain4_sol: "Zigbee Mesh für zusammenhängende Standorte, MIOTY für verteilte Mitglieder (10 km, unabhängig von LTE/WLAN) — beide als eine einheitliche Schicht verwaltet."
kc_pain5_title: "Kollektives Flexibilitätspotenzial bleibt ungenutzt"
kc_pain5_desc: "Eine aktive Gemeinschaft mit PV und Speicher verfügt über echte kollektive Flexibilität — ohne Plattform kann sie weder prognostiziert noch angeboten werden."
kc_pain5_sol: "KERN erstellt rollierende 24-h-Flexibilitätsprognosen für die gesamte Gemeinschaft und verbindet auf Anfrage mit Aggregatoren oder Netzbetreibern."
kc_loop_h2: "Wie KERN <strong>die Gemeinschaft betreibt</strong>"
kc_features_h2: "Was KERN <strong>für Gemeinschaften leistet</strong>"
kc_feat1_h3: Gemeinschaftsoptimierung
kc_feat1_p: "Maximiert den kollektiven Eigenverbrauch aller Mitglieder — in Echtzeit und mit 24-h-Prognose."
kc_feat2_h3: Speicher- und Laststeuerung
kc_feat2_p: "Autonome Steuerung gemeinsamer Speicher und steuerbarer Lasten zum Ausgleich von Angebot und Nachfrage."
kc_feat3_h3: Echtzeit-Dashboard
kc_feat3_p: "Erzeugung, Verbrauch, Eigenverbrauchsquote und Flexibilitätspotenzial — für Betreiber und optional für Mitglieder."
kc_feat4_h3: Flexibilitätsprognose
kc_feat4_p: "Rollierende 24-h-Prognose der verfügbaren Gemeinschaftsflexibilität — Grundlage für Aggregatoren oder Netzbetreiber."
kc_feat5_h3: Mehrstandort-Konnektivität
kc_feat5_p: "Zigbee Mesh für zusammenhängende Standorte, MIOTY für verteilte Mitglieder — jeder Teilnehmer zuverlässig verbunden."
kc_feat6_h3: Aggregator-Anbindung
kc_feat6_p: "Gemeinschaftsflexibilität auf Abruf gesteuert — mit bestätigter Ausführung zurück an die anfragende Partei."
kc_partner_h3: "Übernehmen Sie bereits die EEG-Abrechnung oder Mitgliederverwaltung?"
kc_partner_p: "KERN ist die Optimierungs- und Steuerungsschicht — keine Abrechnungsplattform. Wir integrieren uns in Ihre bestehende Abrechnungsinfrastruktur. Gemeinsam bieten Sie das Gesamtpaket: Abrechnung von Ihnen, Optimierung von KERN."
kc_partner_cta: "Partnerschaft besprechen →"
kc_cta_h2: "Mehr Energie bleibt in der Gemeinschaft."
kc_cta_p: "30 Minuten, um zu zeigen, wie KERN eine Live-Energiegemeinschaft optimiert — von der Echtzeit-Steuerung bis zu Flexibilitätsmärkten."

