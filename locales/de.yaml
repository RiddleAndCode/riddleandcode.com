car_meta_title: "Karriere — Riddle&amp;Code"
car_meta_desc: "Werden Sie Teil des Teams, das KERN aufbaut — die Infrastrukturplattform für verteilte Energie."
car_h1: "<span class=\"highlight\">Werden Sie Teil des Teams</span><br>Bauen Sie Infrastruktur für die Energiewende"
car_sub: "Riddle&amp;Code baut KERN — die Plattform, mit der Energieversorger und Aggregatoren verteilte Energieanlagen verbinden, steuern und monetarisieren. Wir arbeiten an schwierigen Problemen in der Energieinfrastruktur, Funkkonnektivität und autonomen Systemen."
car_purpose_tag: "UNSER ZWECK"
car_purpose_h2: "Der Riddle&amp;Code-Geist"
car_purpose1_h3: "Zweck: Warum existieren wir?"
car_purpose1_strong: "Infrastruktur für die Energiewende aufbauen."
car_purpose1_p: "Wir liefern die Konnektivitäts- und Autonomieschicht, die verteilte Energieanlagen zu verwaltbarer, monetarisierbarer Infrastruktur macht — für Energieversorger und Aggregatoren in ganz Europa."
car_purpose2_h3: "Vision: Wohin gehen wir?"
car_purpose2_strong: "Ein Europa, in dem jede verteilte Energieanlage zur Netzstabilität beiträgt."
car_purpose2_p: "Wir sehen ein Netz, in dem Flexibilität hinter dem Zähler kontinuierlich prognostiziert, gesteuert und bestätigt wird — ohne manuelle Eingriffe, in jedem Maßstab."
car_purpose3_h3: "Mission: Wie erreichen wir das?"
car_purpose3_strong: "KERN in jedem Flexibilitäts-Stack eines europäischen Versorgers bis 2030."
car_purpose3_p: "Unser Ziel ist es, die autonome Energiemanagementschicht zu liefern, die verteilte Flexibilität zuverlässig, monetarisierbar und skalierbar macht."
car_values_h3: "Unsere Kernwerte"
car_values_sub: "Die Prinzipien, die alles leiten, was wir tun"
car_val1_label: Neugier
car_val1_desc: "Wir erforschen, hinterfragen und lernen ständig. Neugier treibt Innovation und hilft uns, Grenzen beim Aufbau von Energieinfrastruktur zu verschieben."
car_val2_label: Empathie
car_val2_desc: "Das Verständnis unserer Kollegen, Partner und Kunden ermöglicht es uns, Lösungen zu entwickeln, die wirklich wichtig sind und einen Unterschied machen."
car_val3_label: Zuhören
car_val3_desc: "Aktives Zuhören hilft uns, Bedürfnisse zu verstehen, effektiv zusammenzuarbeiten und gemeinsam bessere Produkte zu entwickeln."
car_val4_label: Beharrlichkeit
car_val4_desc: "Schwierige Probleme zu lösen erfordert Ausdauer. Wir nehmen Herausforderungen an und bleiben dran, bis wir unsere Ziele erreichen."
car_val5_label: Freude
car_val5_desc: "Wir glauben daran, den Weg zu genießen. Eine positive, engagierte Unternehmenskultur bringt unsere besten Leistungen hervor."
car_val6_label: Engagement
car_val6_desc: "Wir sind unserer Mission, unserem Team und unseren Partnern verpflichtet. Engagement treibt Exzellenz in allem, was wir liefern."
car_benefits_tag: VORTEILE
car_benefits_h2: "Warum Riddle&amp;Code?"
car_ben1_h3: "Echter Infrastruktureinfluss"
car_ben1_p: "Arbeiten Sie an einem Produktivsystem, das live Energieassets verwaltet. Ihr Code steuert echte Hardware hinter echten Zählern — keine Simulation."
car_ben2_h3: "Wien &amp; Remote"
car_ben2_p: "Wien wurde zum zehnten Mal in Folge zur lebenswertesten Stadt gewählt, und wir wissen, dass es andere schöne Orte gibt. Arbeiten Sie dort, wo Sie am produktivsten sind."
car_ben3_h3: "Flexibles Umfeld"
car_ben3_p: "Modernes Büro oder Remote-Arbeit — genießen Sie ein flexibles Arbeitsumfeld, das sich Ihren Bedürfnissen anpasst."
car_ben4_h3: "Europäischer Energiemarkt"
car_ben4_p: "Arbeiten Sie an der Schnittstelle von Funktechnologie, Energiemärkten und regulatorischen Rahmenbedingungen in Österreich, Deutschland und der EU."
car_ben5_h3: "Faire Vergütung"
car_ben5_p: "Erhalten Sie eine faire Vergütung, die Ihren Qualifikationen und Ihrer Erfahrung entspricht."
car_ben6_h3: "Work-Life-Balance"
car_ben6_p: "Ein ausgeruhtes Sie ist ein glückliches Sie. Wir sorgen dafür, dass Sie genug Zeit für die Work-Life-Balance haben."
car_cta_h2: "Bereit, uns beizutreten?"
car_cta_p: "Wir suchen immer talentierte Menschen, die unsere Leidenschaft für den Aufbau von Infrastruktur für die Energiewende teilen."
car_cta_primary: "Offene Stellen ansehen"
car_cta_secondary: "Mehr über uns erfahren"

