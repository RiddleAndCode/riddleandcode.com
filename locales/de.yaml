# KERN-Übersichtsseite (kern/index.html)
# ══════════════════════════════════════════════════════════════════════════════
ki_meta_title: "KERN by Riddle&amp;Code — Autonome Energieplattform"
ki_meta_desc: "KERN ist die autonome Energiemanagementplattform hinter dem Zähler — prognostiziert, steuert und liefert Flexibilität für Aggregatoren, Energieversorger und Energiegemeinschaften."

ki_eyebrow: "Riddle&amp;Code — Autonome Energieplattform"
ki_h1: "<strong>Autonome</strong> Energie<br>hinter dem Zähler."
ki_lead: "KERN ist die Plattform hinter dem Zähler — optimiert, prognostiziert und steuert Flexibilität aus Haushalten, Gewerbebetrieben, Microgrids und Energiegemeinschaften autonom."

ki_concept_stmt: "Sie senden ein Signal.<br><strong>KERN liefert.</strong><br>Was hinter dem Zähler passiert, ist unsere Aufgabe."
ki_concept_sub: "Aggregatoren, Energieversorger und Plattformen interagieren mit KERN über eine saubere API — Prognose eingehend, Flexibilitätssignal eingehend, Bestätigung ausgehend. KERN übernimmt alles dazwischen: Neuausgleich, Anlagenauswahl, Steuerung, Bestätigung."

ki_contexts_h2: "Optimierung <strong>hinter dem Zähler</strong>"
ki_contexts_sub: "KERN arbeitet in vier Anlagenkontexten — alle auf einer Plattform."
ki_ctx_household_h3: Haushalte
ki_ctx_household_p: "PV + Hausspeicher + Wärmepumpe + Ladestation — als Einheit optimiert. HEMS-Flottenmanagement für Energieversorger."
ki_ctx_ci_h3: "Gewerbe &amp; Industrie"
ki_ctx_ci_p: "Gewerbe-PV, BESS, BHKW, steuerbare Lasten auf MS/NS-Ebene. Lastspitzenkappung, Lastmanagement, Flexibilitätssteuerung."
ki_ctx_micro_h3: Microgrids
ki_ctx_micro_p: "Mehrere Anlagen hinter einem gemeinsamen Netzverknüpfungspunkt. Koordinierte Optimierung, inselbetriebsfähig."
ki_ctx_esc_h3: "Energiegemeinschaften (EEG)"
ki_ctx_esc_p: "Gemeinschaftsoptimierung über mehrere Mitglieder und Zähler. Gemeinsamer Eigenverbrauch maximiert, kollektive Flexibilität aggregiert."

ki_modes_h2: "Drei <strong>Optimierungsmodi</strong>"
ki_modes_sub: "Pro Anlage oder Portfolio konfigurierbar — kombinierbar."
ki_mode1_num: "Modus 01"
ki_mode1_h3: Eigenverbrauchsoptimierung
ki_mode1_p: "Lokalen Eigenverbrauch maximieren. Netzeinspeisung und -bezug minimieren. Standardmodus für Haushalte und kleinere G&amp;I-Anlagen."
ki_mode2_num: "Modus 02"
ki_mode2_h3: "Wirtschaftliche Optimierung"
ki_mode2_p: "Monetären Ertrag maximieren — Intraday-Arbitrage, FCR/aFRR-Gebote, Lastspitzenkappung, Reduzierung der Leistungspreise. Dispatch gesteuert durch Echtzeit-Day-Ahead- und Intradaypreissignale. Standard für Aggregatoren und G&amp;I-Flexibilität."
ki_mode3_num: "Modus 03"
ki_mode3_h3: Gemeinschaftsoptimierung
ki_mode3_p: "Gemeinsamen Eigenverbrauch über mehrere Mitglieder maximieren. Faire Zuteilung nach Anteil. Standard für EEG und Microgrids."

ki_conn_h2: "Konnektivität <strong>nach Topologie</strong>"
ki_conn_sub: "Die richtige Technologie für jede Anlagenkonfiguration — beide in KERN als einheitliche Schicht verwaltet."
ki_zigbee_use: "Zusammenhängende Standorte"
ki_zigbee_h3: "Zigbee-Mesh"
ki_zigbee_p: "Für Anlagen am selben Standort — Gebäude, Campusse, Industriegeländer. Kostengünstig, einfach zu installieren, selbstheilendes Mesh-Netz. Keine komplexe Gateway-Infrastruktur erforderlich."
ki_mioty_use: "Verteilte Anlagen"
ki_mioty_h3: MIOTY
ki_mioty_p: "IEC-Standard-LPWAN für geografisch verteilte Anlagen — ländliche PV-Anlagen, MS-angeschlossene BESS, verteilte Standorte. 10 km Reichweite, 1,5 Mio. Nachrichten/Tag, unabhängig von LTE und WLAN."
ki_tech_link: "Vollständige Technologieübersicht →"

ki_forwhom_h2: "KERN <strong>für Ihre Rolle</strong>"
ki_role_agg_h3: Aggregatoren
ki_role_agg_p: "Gebote mit bestätigter Steuerung und 24h-Prognosen absichern."
ki_role_agg_link: "Für Aggregatoren →"
ki_role_util_h3: Energieversorger
ki_role_util_p: "Ihren Kundenstamm in ein monetarisierbares Flexibilitätsportfolio umwandeln."
ki_role_util_link: "Für Energieversorger →"
ki_role_comm_h3: Energiegemeinschaften
ki_role_comm_p: "Autonome Eigenverbrauchsoptimierung und Flexibilitätsaggregation."
ki_role_comm_link: "Für Gemeinschaften →"
ki_role_vpp_h3: VPP-Plattformen
ki_role_vpp_p: "Die Lücke in der Anlagenschicht unterhalb Ihrer Plattform mit einer sauberen API schließen."
