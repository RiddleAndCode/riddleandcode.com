# Über uns (company/about-us.html)
# ══════════════════════════════════════════════════════════════════════════════
au_meta_title: "Über Riddle&amp;Code — Infrastruktur für verteilte Energie"
au_meta_desc: "Riddle&amp;Code baut KERN — die Infrastrukturplattform für verteiltes Energiemanagement. Für Energieversorger, Aggregatoren und Gemeinschaften in ganz Europa."
au_eyebrow: "Wien, Österreich"
au_h1: "Infrastruktur für<br><span class=\"highlight\">verteilte Energie.</span>"
au_sub: "Riddle&amp;Code baut KERN — die Plattform, mit der Energieversorger und Aggregatoren verteilte Energieanlagen verbinden, verwalten und monetarisieren. Wir besitzen den gesamten Stack: Hardware, Konnektivität, Plattform und Marktzugang."
au_why_tag: "WARUM WIR EXISTIEREN"
au_why_h2: "Die Infrastrukturlücke in der Energiewende"
au_why_desc: "Dezentrale Energiequellen nehmen zu — Dachsolar, Batterien, Wärmepumpen, Ladestationen. Energieversorger stehen vor Flexibilitätsverpflichtungen. Aggregatoren brauchen Skalierung. Niemand wollte die Konnektivitäts- und Compliance-Schicht von Grund auf neu aufbauen.<br><br>Wir haben es getan."
au_val1_h3: "Infrastruktur, keine Apps"
au_val1_p: "KERN ist die Schicht, die zwischen physischen Assets und Energiemärkten sitzt. Wir sind keine Verbraucher-App oder ein Ableseservice. Wir sind die Plattform, die Ihr Betriebsteam zuverlässig und skalierbar betreibt."
au_val2_h3: "Vollständige Stack-Kontrolle"
au_val2_p: "Hardware, MIOTY-Funkkonnektivität, HEMS/ESC/LSP-Plattform und direkter Marktzugang in einer einzigen Integration. Partner setzen einmal auf — kein Zusammenstückeln mehrerer Anbieter."
au_val3_h3: "Regulatorische Komplexität absorbiert"
au_val3_p: "EEG-Compliance, Flexibilitätsberichterstattung und Prüfdokumentation sind in KERN integriert — kein manueller Prozess. Wir tragen die technische und regulatorische Komplexität, damit Sie die Kundenbeziehung tragen."
au_what_h3: "Was KERN liefert"
au_what_sub: "Eine Plattform. Drei Asset-Klassen. Eine Integration."
au_tech1_h4: "MIOTY-Funkkonnektivität"
au_tech1_p: "10 km Reichweite, 1,5 Millionen Nachrichten pro Tag, ultra-niedriger Stromverbrauch. Kein WLAN, keine App-Abhängigkeit — funktioniert in Kellern, ländlichen Gebieten und Industriestandorten."
au_tech2_h4: "HEMS — Wohngebäude-Assets"
au_tech2_p: "Verwaltung von Wohngebäude-PV- und Batterieportfolios. Optimierung von Intraday-Handel, Flexibilitätssteuerung und Abregelungsvermeidung — automatisch, über Tausende von Haushalten."
au_tech3_h4: "ESC — Energiegemeinschaften"
au_tech3_p: "Gemeinschaftliche Energiebündelung für österreichische und EU-Rechtsrahmen. Compliance ist prüfbar und automatisiert — kein manueller Prozess für Ihre Rechtsabteilung."
au_tech4_h4: "LSP — Netzskala-Flexibilität"
au_tech4_p: "Large Scale Plant Management für netzskale Assets: BESS, industrielle Lasten und aggregierte Portfolios. Direktzugang zu Systemdienstleistungs- und Flexibilitätsmärkten."
au_proof_tag: REFERENZEN
au_proof_h2: "Validiert, nicht versprochen"
au_proof1_h3: "Führende Energieversorger"
au_proof1_p: "Validiert mit führenden Energieversorgern. Das Einsatzmodell, die regulatorische Ausrichtung und die Wirtschaftlichkeit sind auf regionaler Ebene validiert."
au_proof2_h3: "MIOTY im Maßstab"
au_proof2_p: "1,5 Millionen Nachrichten pro Tag demonstrierte Kapazität. IEC-standardisiert — kein proprietäres Lock-in. Partner übernehmen einen veröffentlichten Standard."
au_proof3_h3: "Wirtschaftlichkeit, die funktioniert"
au_proof3_p: "Hardware zu €239 Verkauf / €100 COGS — 58 % Marge. Plattform-ARR von €114 pro HEMS-Haushalt pro Jahr. Die Wirtschaftlichkeit unterstützt Versorgerbündelpreise im Maßstab."
au_founders_tag: GRÜNDER
au_founders_h2: "Das Team hinter KERN"
au_cta_h2: "Sprechen Sie mit dem Team"
au_cta_p: "Executive Briefing, technischer Deep Dive oder Partnergespräch — wir passen das Format an Ihre Situation an."
au_cta_primary: "Kontakt aufnehmen"
au_cta_secondary: "KERN entdecken"

