kp_meta_desc: "Schließen Sie die Lücke unter Ihrer VPP-Plattform. KERN liefert normalisierte Telemetrie, bestätigte Steuerung und 24-h-Prognosen für alle Assets Ihrer Kunden."
kp_eyebrow: "KERN — Für VPP-Plattformen"
kp_h1: "Ihre Plattform ist stark<br><strong>oberhalb der Asset-Ebene.</strong><br>KERN schließt die Lücke darunter."
kp_lead: "KERN integriert sich unterhalb Ihres VPP als Asset-Management- und Konnektivitätsschicht. Ihre Plattform erhält einen sauberen, normalisierten API-Feed, bestätigte Steuerung und 24-h-Flexibilitätsprognosen — für alle Assets Ihrer Kunden, einschließlich der bislang nicht erreichbaren."
kp_hero_cta: "API-Integration besprechen"
kp_stack_h2: "Wo KERN <strong>in Ihren Stack passt</strong>"
kp_pains_h2: "Drei Lücken, <strong>die KERN füllt</strong>"
kp_pain1_title: "Assets mit unzuverlässiger Konnektivität bleiben außerhalb des Portfolios"
kp_pain1_desc: "Ländliche Standorte, Industriegelände, Keller — LTE bricht ab, WLAN ist instabil. Ihre Kunden können diese Assets nicht in Ihre Plattform einbringen. Potenzial bleibt ungenutzt."
kp_pain1_sol: "MIOTY (10 km, IEC-Standard) und Zigbee Mesh machen jedes Asset erreichbar — Ihre Kunden erweitern ihr Portfolio ohne Infrastrukturinvestitionen."
kp_pain2_title: "Keine Steuerungsrückmeldung — der Regelkreis ist offen"
kp_pain2_desc: "Ihre Plattform sendet Befehle — ob das Asset reagiert hat, bleibt bis zur nächsten Messung unbekannt. Abweichungen werden zu spät erkannt, Pönalen treffen Ihre Kunden."
kp_pain2_sol: "KERN bestätigt jede Steuerung auf Asset-Ebene und meldet in Echtzeit zurück. Ihre Plattform weiß sofort, ob die Flexibilitätsverpflichtung erfüllt wird."
kp_pain3_title: "Heterogene Assets erhöhen den Integrationsaufwand"
kp_pain3_desc: "Jeder neue Asset-Typ, jeder neue Hersteller, jedes neue Protokoll bedeutet Integrationsaufwand. Das verlangsamt das Onboarding und begrenzt die Skalierung."
kp_pain3_sol: "KERN normalisiert alle Asset-Typen auf ein einheitliches Datenmodell. Ihre Plattform spricht mit KERN — nicht mit jedem Asset einzeln."
kp_what_h2: "Was Ihre Plattform <strong>von KERN bekommt</strong>"
kp_what1_h3: "Sauberer, normalisierter API-Feed"
kp_what1_p: "Einheitliche Telemetrie, unabhängig von Asset-Typen, Herstellern oder Protokollen. Eine Integration, alle Assets."
kp_what2_h3: "Steuerung mit Bestätigung"
kp_what2_p: "KERN empfängt Ihren Steuerungsbefehl, führt ihn auf Asset-Ebene aus und meldet zurück, ob und wie er erfüllt wurde."
kp_what3_h3: "24-h-Flexibilitätsprognose"
kp_what3_p: "Rollierende 24-h-Prognose pro Asset und Portfolio — basierend auf Live-Telemetrie, wettergestützten PV-Modellen und historischen Lastmustern. Kontinuierlich verfeinert bis zur Lieferung. Präzisere Gebote, weniger Pönalen für Ihre Kunden."
kp_what4_h3: "Mehr Assets im Portfolio"
kp_what4_p: "Assets, die bisher aufgrund von Konnektivitätsproblemen ausgeschlossen waren, werden verfügbar. Ihre Kunden erweitern ihr Portfolio ohne CAPEX."
kp_integ_h2: "Integrations-<strong>optionen</strong>"
kp_integ_th1: Modell
kp_integ_th2: Beschreibung
kp_integ_th3: Aufwand
kp_integ1_model: API-Integration
kp_integ1_desc: "KERN liefert normalisierte Telemetrie und akzeptiert Steuerungsbefehle via REST/WebSocket. Ihre Plattform bleibt primär."
kp_integ2_model: White-Label
kp_integ2_desc: "KERN läuft unter Ihrer Marke als 'Asset Connectivity Module' für Ihre Kunden."
kp_integ3_model: Pilot
kp_integ3_desc: "Ein Kunde, eine Asset-Klasse, definierter Umfang — schnell startbar, geringes Risiko."
kp_cta_h2: "Sprechen wir über die API."
kp_cta_p: "30 Minuten, um die Spezifikation durchzugehen und zu identifizieren, welche Assets Ihrer Kunden derzeit ausgeschlossen sind — und wie schnell sich das mit KERN ändert."
kp_cta_primary: "API-Integration besprechen"

