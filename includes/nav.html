<style>
  .nav {
    position: relative;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #1a1a1a;
  }

  .nav-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--text-primary);
    flex-shrink: 0;
  }

  .nav-logo-symbol { display: block; height: 28px; width: auto; }

  .nav-logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .nav-logo-kern {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--text-primary);
  }

  .nav-logo-by {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .nav-menu {
    display: flex;
    gap: 0.25rem;
    align-items: center;
    list-style: none;
    flex: 1;
    justify-content: flex-end;
  }

  /* Base nav link */
  .nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    transition: color 0.2s ease, background 0.2s ease;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

  /* Dropdown parent */
  .nav-item { position: relative; list-style: none; }

  .nav-item > .nav-link::after {
    content: '▾';
    font-size: 0.7rem;
    opacity: 0.6;
    transition: transform 0.2s ease;
  }

  .nav-item:hover > .nav-link::after { transform: rotate(180deg); }

  /* Dropdown menu */
  .nav-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: #111;
    border: 1px solid #222;
    border-radius: 10px;
    padding: 0.5rem;
    min-width: 220px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);
    z-index: 100;
  }

  .nav-item:hover .nav-dropdown { display: block; }

  .nav-dropdown a {
    display: block;
    padding: 0.6rem 0.9rem;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.875rem;
    border-radius: 6px;
    transition: color 0.2s ease, background 0.2s ease;
    white-space: nowrap;
  }

  .nav-dropdown a:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }

  .nav-dropdown .dropdown-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 0.5rem 0.9rem 0.25rem;
  }

  .nav-dropdown .dropdown-divider {
    height: 1px;
    background: #222;
    margin: 0.4rem 0.5rem;
  }

  /* KERN highlight in dropdown */
  .nav-dropdown .kern-link {
    color: var(--kern-accent);
    font-weight: 500;
  }

  .nav-dropdown .kern-link:hover { background: rgba(196,123,43,0.1); }

  /* Language toggle */
  .nav-lang {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-left: 0.5rem;
  }

  .nav-lang a {
    color: var(--text-muted);
    text-decoration: none;
    padding: 0.25rem 0.4rem;
    border-radius: 4px;
    transition: color 0.2s ease;
  }

  .nav-lang a:hover, .nav-lang a.active { color: var(--text-primary); }
  .nav-lang span { opacity: 0.3; }

  /* CTA */
  .nav-cta {
    background: var(--kern-accent) !important;
    color: #0a0a0a !important;
    padding: 0.55rem 1.25rem !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    font-size: 0.875rem !important;
    transition: opacity 0.2s ease, transform 0.2s ease !important;
    margin-left: 0.5rem;
    white-space: nowrap;
  }

  .nav-cta:hover {
    opacity: 0.88 !important;
    transform: translateY(-1px) !important;
    background: var(--kern-accent) !important;
  }

  /* Mobile toggle */
  .nav-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0.4rem;
  }

  @media (max-width: 900px) {
    .nav-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.98);
      flex-direction: column;
      align-items: flex-start;
      padding: 1rem;
      border-bottom: 1px solid #222;
      gap: 0.25rem;
    }

    .nav-menu.active { display: flex; }
    .nav-toggle { display: block; }
    .nav-container { flex-wrap: wrap; }
    .nav-item { width: 100%; }
    .nav-dropdown { position: static; box-shadow: none; border: none; background: #0d0d0d; border-radius: 6px; margin-top: 0.25rem; }
    .nav-item:hover .nav-dropdown { display: none; }
    .nav-item.open .nav-dropdown { display: block; }
    .nav-item > .nav-link { width: 100%; justify-content: space-between; }
    .nav-lang { margin-left: 0; padding: 0.5rem 0.75rem; }
    .nav-cta { margin-left: 0; width: 100%; text-align: center; margin-top: 0.5rem; }
  }
</style>

<nav class="nav">
  <div class="nav-container">
    <a href="/index.html" class="nav-logo">
      <!-- KERN symbol: 3 concentric rings + copper core -->
      <svg class="nav-logo-symbol" viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="38" cy="38" r="34" fill="none" stroke="#ffffff" stroke-width="1"   opacity="0.18"/>
        <circle cx="38" cy="38" r="24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.42"/>
        <circle cx="38" cy="38" r="14" fill="none" stroke="#ffffff" stroke-width="2"   opacity="0.75"/>
        <circle cx="38" cy="38" r="5.5" fill="#F59E0B"/>
      </svg>
      <div class="nav-logo-text">
        <span class="nav-logo-kern">KERN</span>
        <span class="nav-logo-by">by Riddle&amp;Code</span>
      </div>
    </a>

    <button type="button" class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>

    <ul class="nav-menu" id="navMenu">

      <!-- KERN dropdown -->
      <li class="nav-item" id="kernDropdown">
        <a href="/kern/" class="nav-link">KERN</a>
        <div class="nav-dropdown">
          <div class="dropdown-label">Platform</div>
          <a href="/kern/" class="kern-link">KERN Overview</a>
          <div class="dropdown-divider"></div>
          <div class="dropdown-label">Solutions</div>
          <a href="/kern/for-utilities.html">For Utilities</a>
          <a href="/kern/for-aggregators.html">For Aggregators</a>
          <a href="/kern/for-communities.html">For Energy Communities</a>
          <a href="/kern/for-platforms.html">For Platforms</a>
        </div>
      </li>

      <li><a href="/technology/" class="nav-link">Technology</a></li>
      <li><a href="/references/" class="nav-link">References</a></li>

      <!-- Company dropdown -->
      <li class="nav-item">
        <a href="/company/about-us.html" class="nav-link">Company</a>
        <div class="nav-dropdown">
          <a href="/company/about-us.html">About Us</a>
          <a href="/company/news.html">News</a>
          <a href="/company/media.html">Media</a>
          <a href="/company/career.html">Careers</a>
        </div>
      </li>

      <!-- Language toggle -->
      <li>
        <div class="nav-lang">
          <a href="#" class="active" id="lang-en">EN</a>
          <span>|</span>
          <a href="#" id="lang-de">DE</a>
        </div>
      </li>

      <!-- CTA -->
      <li><a href="/company/get-in-touch.html" class="nav-link nav-cta">Book a Demo</a></li>
    </ul>
  </div>
</nav>

<script>
  // Mobile toggle
  (function() {
    const toggle = document.getElementById('navToggle');
    const menu = document.getElementById('navMenu');
    if (!toggle || !menu) return;

    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      menu.classList.toggle('active');
    });

    // Mobile: tap to open dropdowns
    document.querySelectorAll('.nav-item > .nav-link').forEach(function(link) {
      link.addEventListener('click', function(e) {
        if (window.innerWidth <= 900) {
          e.preventDefault();
          const item = this.closest('.nav-item');
          item.classList.toggle('open');
        }
      });
    });

    document.addEventListener('click', function(e) {
      if (!toggle.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('active');
      }
    });
  })();
</script>
